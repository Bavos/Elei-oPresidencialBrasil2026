name: Render Remotion video

on:
  workflow_dispatch:
  push:
    paths:
      - 'video-eleicao2026/**'

jobs:
  render:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: video-eleicao2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Render video
        run: npm run render

      - name: Upload final.mp4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-mp4
          path: video-eleicao2026/output/final.mp4
          if-no-files-found: error
